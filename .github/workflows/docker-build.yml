name: Build and Push Mood-Muncher Images

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build backend image
        run: docker build -t christophecaphane/mood-muncher-backend ./mood-muncher-backend

      - name: Build frontend image
        run: docker build -t christophecaphane/mood-muncher-frontend ./mood-muncher-frontend

      - name: Push backend image
        run: docker push christophecaphane/mood-muncher-backend

      - name: Push frontend image
        run: docker push christophecaphane/mood-muncher-frontend